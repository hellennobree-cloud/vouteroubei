<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Mensagem</title>

<style>
body{
    margin:0;
    font-family:Arial;

    background-image:url("flores.jpeg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* camada escura */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:0;
}

/* chat */
.chat{
    position:relative;
    z-index:1;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:20px;
    gap:10px;
}

/* mensagens */
.mensagem{
    display:flex;
}

/* bolha estilo WhatsApp */
.bubble{
    max-width:75%;
    padding:12px 14px;
    border-radius:12px;
    background:#dcf8c6;
    color:#111;
    font-size:18px;
    line-height:1.3;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);

    animation: glow 2s infinite alternate;
}

/* entrada animada */
.msg{
    opacity:0;
    transform:translateY(25px) scale(0.9);
    animation:enter 0.6s forwards;
}

@keyframes enter{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}
