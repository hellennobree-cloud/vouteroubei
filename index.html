<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#000;
}

/* 🖼️ FUNDO CINEMATOGRÁFICO */
body::before{
    content:"";
    position:absolute;
    inset:-10%;
    background-image:url("flores.jpeg");
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;

    animation:float 12s ease-in-out infinite;
    z-index:0;
}

/* 🌫️ overlay premium */
body::after{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
    z-index:0;
}

/* 🎬 animação viva */
@keyframes float{
    0%{
        transform:scale(1) translateY(0px) rotate(0deg);
        filter:brightness(1);
    }
    25%{
        transform:scale(1.03) translateY(-5px) rotate(0.3deg);
        filter:brightness(1.05);
    }
    50%{
        transform:scale(1.05) translateY(0px) rotate(-0.3deg);
        filter:brightness(1.1);
    }
    75%{
        transform:scale(1.03) translateY(5px) rotate(0.2deg);
        filter:brightness(1.05);
    }
    100%{
        transform:scale(1) translateY(0px) rotate(0deg);
        filter:brightness(1);
    }
}

/* 💬 mensagem */
.mensagem{
    position:absolute;
    top:68%;
    left:50%;
    transform:translate(-50%,-50%);
    
    width:320px;
    max-width:90%;
    text-align:center;
    color:#fff;

    z-index:1;

    animation:fadeIn 1.2s ease-out;
}

/* entrada suave */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translate(-50%,-40%);
    }
    to{
        opacity:1;
        transform:translate(-50%,-50%);
    }
}

.titulo{
    font-size:32px;
    font-weight:bold;
}

.texto{
    font-size:28px;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="mensagem">
    <div class="titulo">
        Oiii Linda !!! 💖
    </div>

    <div class="texto">
        O vencimento do<br>
        Cartão é dia 15 😂!!
    </div>
</div>

</body>
</html>
