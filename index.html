<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    font-family:Arial, sans-serif;

    /* 🖼️ imagem inteira aparecendo */
    background-image:url("flores.jpeg");
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
    background-color:#f5e6d3;

    position:relative;
}

/* caixa da mensagem */
.mensagem{
    position:absolute;
    top:60%;
    left:50%;
    transform:translate(-50%,-50%);
    
    width:320px;
    max-width:90%;
    text-align:center;
    color:#222;
}

/* título */
.titulo{
    font-size:32px;
    font-weight:bold;
}

/* texto */
.texto{
    font-size:28px;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="mensagem">
    <div class="titulo">
        Oiii Linda !!! 💖
    </div>

    <div class="texto">
        O vencimento do<br>
        Cartão é dia 15 😂!!
    </div>
</div>

</body>
</html>
