<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    font-family:Arial, sans-serif;

    /* 🖼️ imagem de fundo */
    background-image:url("flores.jpeg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* camada escura */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

/* texto */
h1{
    position:relative;
    z-index:1;
    color:white;
    font-size:32px;
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<h1>Oii Lindaaa 💖<br>o Cartão vence dia 15 !!</h1>

</body>
</html>
