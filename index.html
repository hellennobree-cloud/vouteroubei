<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Mensagem</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;

    /* 💖 SUA IMAGEM */
    background-image:url("flores.jpeg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    height:100vh;
    overflow:hidden;
}

/* camada escura */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:0;
}

/* chat */
.chat{
    position:relative;
    z-index:1;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:20px;
    gap:10px;
}

/* mensagem */
.mensagem{
    display:flex;
}

/* bolha estilo WhatsApp */
.bubble{
    max-width:75%;
    padding:12px 14px;
    border-radius:12px;
    background:#dcf8c6;
    color:#111;
    font-size:18px;
    line-height:1.3;

    box-shadow:0 4px 10px rgba(0,0,0,0.2);

    animation: glow 2s infinite alternate;
}

/* entrada animada */
.msg{
    opacity:0;
    transform:translateY(25px) scale(0.95);
    animation:enter 0.6s forwards;
}

@keyframes enter{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* delays */
.delay1{ animation-delay:0.6s; }
.delay2{ animation-delay:1.6s; }

/* brilho leve */
@keyframes glow{
    from{ box-shadow:0 0 10px rgba(255,255,255,0.1); }
    to{ box-shadow:0 0 20px rgba(255,255,255,0.25); }
}

/* opcional: efeito leve de “subida” */
.chat{
    animation:fadeIn 1s ease-out;
}

@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}
</style>
</head>

<body>

<div class="chat">

    <div class="mensagem msg delay1">
        <div class="bubble">
            Oiii Linda !!! 💖
        </div>
    </div>

    <div class="mensagem msg delay2">
        <div class="bubble">
            O vencimento do<br>
            Cartão é dia 15 😂!!
        </div>
    </div>

</div>

</body>
</html>
