<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    height:100vh;
    overflow:hidden;
}

/* 💖 fundo vivo */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:url("flores.jpeg") center/cover no-repeat;
    transform:scale(1.1);
    animation:zoom 15s ease-in-out infinite alternate;
    z-index:0;
}

/* leve escurecimento */
body::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:0;
}

@keyframes zoom{
    from{ transform:scale(1.1); }
    to{ transform:scale(1.2); }
}

/* chat */
.chat{
    position:relative;
    z-index:1;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:20px;
    gap:10px;
}

/* mensagens */
.mensagem{
    display:flex;
}

.bubble{
    max-width:75%;
    padding:12px 14px;
    border-radius:12px;
    background:#dcf8c6;
    color:#111;
    font-size:18px;
    line-height:1.3;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    animation:glow 2s infinite alternate;
}

/* entrada animada */
.msg{
    opacity:0;
    transform:translateY(25px) scale(0.95);
    animation:enter 0.6s forwards;
}

@keyframes enter{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.delay1{ animation-delay:0.6s; }
.delay2{ animation-delay:1.6s; }

@keyframes glow{
    from{ box-shadow:0 0 10px rgba(255,255,255,0.1); }
    to{ box-shadow:0 0 20px rgba(255,255,255,0.25); }
}
</style>
