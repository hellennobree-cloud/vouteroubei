<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* 🖼️ FUNDO ANIMADO */
body{
    position:relative;
    background:#f5e6d3;
}

/* camada da imagem animada */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:url("flores.jpeg");
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;

    animation:zoom 10s ease-in-out infinite alternate;
    z-index:0;
}

/* leve brilho escuro pra contraste */
body::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.25);
    z-index:0;
}

/* animação do fundo */
@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.05);
    }
}

/* mensagem */
.mensagem{
    position:absolute;
    top:68%;
    left:50%;
    transform:translate(-50%,-50%);
    
    width:320px;
    max-width:90%;
    text-align:center;
    color:#fff;

    z-index:1;
}

/* textos */
.titulo{
    font-size:32px;
    font-weight:bold;
}

.texto{
    font-size:28px;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="mensagem">
    <div class="titulo">
        Oiii Linda !!! 💖
    </div>

    <div class="texto">
        O vencimento do<br>
        Cartão é dia 15 😂!!
    </div>
</div>

</body>
</html>
