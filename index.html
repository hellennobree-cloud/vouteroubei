<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;

    background-image:url("flores.jpeg");
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
    background-color:#f5e6d3;

    font-family: "Comic Sans MS", cursive;
}

/* Texto sobre o papel */
.mensagem{
    position:absolute;

    top:67%;
    left:50%;

    transform:translate(-50%,-50%);

    width:320px;

    text-align:center;

    color:#222;
}

.titulo{
    font-size:32px;
    margin-bottom:20px;
}

.texto{
    font-size:28px;
    line-height:1.4;
}
</style>
</head>

<body>

<div class="mensagem">
    <div class="titulo">
        Oiii Linda !!! 💖
    </div>

    <div class="texto">
        O vencimento do<br>
        Cartão é dia 15 😂!!
    </div>
</div>

</body>
</html>
